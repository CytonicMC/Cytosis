name: Gradle Wrapper Check
on: [ pull_request ]

jobs:
  check-wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Fail if gradlew was modified
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^gradlew$'; then
            echo "::error::gradlew was modified. Wrapper updates require manual review and approval."
            exit 1
          fi
