name: Build
run-name: Build and deploy by @${{ github.actor }}

env:
  REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
  REPO_PASSWORD: ${{ secrets.REPO_PASSWORD }}
  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

on:
  push:
    branches:
      - master

jobs:
  publish:
    if: github.repository == 'CytonicMC/Cytosis'
    runs-on: ubuntu-latest
    env:
      REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
      REPO_PASSWORD: ${{ secrets.REPO_PASSWORD }}

    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Publish Jar
        run: ./gradlew --build-cache --parallel publish
        env:
          REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
          REPO_PASSWORD: ${{ secrets.REPO_PASSWORD }}

  build-plugins:
    if: github.repository == 'CytonicMC/Cytosis'
    needs: [ publish ]
    runs-on: ubuntu-latest
    steps:
      - name: Build bedwars
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: '${{ secrets.ACTIONS_TOKEN }}'
          repository: 'CytonicMC/CytonicBedwars'
          event-type: 'trigger-workflow'
      - name: Build Lobby
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: '${{ secrets.ACTIONS_TOKEN }}'
          repository: 'CytonicMC/CytonicLobby'
          event-type: 'trigger-workflow'
      - name: Build GG
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: '${{ secrets.ACTIONS_TOKEN }}'
          repository: 'CytonicMC/GildedGorgeBase'
          event-type: 'trigger-workflow'
