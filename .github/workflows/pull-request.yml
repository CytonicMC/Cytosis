name: Build Pull Request
on:
  pull_request:

jobs:
  check-wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Fail if gradlew was modified
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^gradlew$'; then
            echo "::error::gradlew was modified."
            exit 1
          fi

  checkstyle:
    needs: check-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
      - name: Run Checkstyle
        run: ./gradlew --build-cache --parallel checkstyleMain checkstyleTest
      - name: Upload Checkstyle results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-results
          path: build/reports/checkstyle/

  build:
    needs: check-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
      - name: Assemble Jar
        run: ./gradlew --no-daemon --build-cache --parallel thinJar
      - name: Upload jar as artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: thinJar
          path: build/libs/cytosis.jar
